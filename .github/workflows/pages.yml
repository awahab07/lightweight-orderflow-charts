name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Verify Pages is enabled for workflow deployments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status_code="$(curl -sS -o pages-response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")"

          if [ "${status_code}" = "200" ]; then
            exit 0
          fi

          echo "GitHub Pages is not enabled for ${GITHUB_REPOSITORY}." >&2
          echo "Open Settings -> Pages and set Source to GitHub Actions, then re-run this workflow." >&2
          cat pages-response.json >&2
          exit 1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Verify package and public surfaces
        run: npm run check

      - name: Build GitHub Pages site
        env:
          PAGES_REPOSITORY_BASE: /${{ github.event.repository.name }}
        run: npm run site:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
